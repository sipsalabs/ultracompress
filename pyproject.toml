[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ultracompress"
version = "0.5.0"
description = "Lossless 5-bit transformer compression — 8 architectures (1.7B–70B, dense + MoE) at sub-1% PPL degradation. Customer-distributable via `uc pack v0.3`."
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
authors = [
    {name = "Sipsa Labs, Inc.", email = "founder@sipsalabs.com"},
]
keywords = ["model-compression", "llm", "transformer", "fractal", "distillation", "speculative-decoding"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "torch>=2.0",
    "numpy>=1.24",
    "transformers>=4.40",
]

[project.optional-dependencies]
eval = ["lm-eval>=0.4", "datasets>=2.0", "scikit-learn>=1.3"]
serve = ["fastapi>=0.100", "uvicorn>=0.20"]
all = ["lm-eval>=0.4", "datasets>=2.0", "scikit-learn>=1.3", "fastapi>=0.100", "uvicorn>=0.20", "scipy>=1.10", "matplotlib>=3.7"]

[project.urls]
Homepage = "https://github.com/sipsalabs/ultracompress"
Repository = "https://github.com/sipsalabs/ultracompress"
Issues = "https://github.com/sipsalabs/ultracompress/issues"

[project.scripts]
ultracompress = "ultracompress.cli:main"
uc = "ultracompress.cli:main"

[tool.setuptools.packages.find]
include = ["ultracompress*", "lib*"]
