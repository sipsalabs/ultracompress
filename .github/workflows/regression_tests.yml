name: Regression tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress runs on the same branch when a new push lands
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: Regression suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy
          # Install torch CPU-only (faster install in CI; tests don't require CUDA)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # If a setup.py / pyproject lives in the repo, install editable too
          if [ -f pyproject.toml ]; then pip install -e . || true; fi

      - name: Run regression test suite
        run: |
          python -m pytest tests/test_regression_suite.py -v --tb=short

      - name: Run Friday-docs IP-discipline check (standalone)
        run: |
          # Standalone grep — fails if internal vocab leaked into customer-facing docs
          ! grep -rE "V18-C|V18C|DSR-Q|DSRQ|CHBR|PCR\b|SP-band" \
              docs/VARION_FRIDAY_DECK.md \
              docs/VARION_FRIDAY_QA_PREP.md \
              docs/VARION_FRIDAY_ONE_PAGER.md
        shell: bash

      - name: Numerics acceptance harness self-test
        run: |
          cd scripts/varion
          python numerics_acceptance_harness.py --self-test
